# Default configuration for Doctrine Doctor Bundle
# Copy this to your config/packages/doctrine_doctor.yaml and customize as needed

doctrine_doctor:
    # Enable or disable the bundle entirely
    enabled: true

    # Profiler integration
    profiler:
        show_in_toolbar: true

    # Analyzer configurations
    analyzers:
        # N+1 Query Detection
        n_plus_one:
            enabled: true
            threshold: 5  # Minimum number of similar queries to trigger detection

        # Nested N+1 Detection (multi-level relationship chains)
        nested_relationship_n1:
            enabled: true
            threshold: 3  # Minimum repeated queries per table to detect nested N+1

        # Unused Eager Load Detection (unused JOIN FETCH / over-eager loading)
        unused_eager_load:
            enabled: true

        # Slow Query Detection
        slow_query:
            enabled: true
            threshold: 100  # Threshold in milliseconds

        # Missing Index Detection
        missing_index:
            enabled: true
            slow_query_threshold: 1   # Run EXPLAIN on ALL queries (0.001ms+) for demo purposes
            explain_queries: true     # Execute EXPLAIN to detect missing indexes
            min_rows_scanned: 5       # Suggest index if 5+ rows scanned (lowered for demo)

        # Hydration Analysis
        hydration:
            enabled: true
            row_threshold: 50        # Number of rows to consider for analysis (lowered from 1000 to detect real cases)
            critical_threshold: 500  # Number of rows to mark as critical (lowered from 5000)

        # Eager Loading Analysis
        eager_loading:
            enabled: true
            join_threshold: 4          # Maximum number of JOINs before warning
            critical_join_threshold: 7  # Number of JOINs to mark as critical

        # EntityManager Clear Detection (Memory Leak Prevention)
        entity_manager_clear:
            enabled: true
            batch_size_threshold: 20  # Minimum number of INSERT/UPDATE operations to trigger detection

        # GetReference Optimization Detection
        get_reference:
            enabled: true
            threshold: 3  # Minimum number of simple SELECT by ID queries to suggest getReference()

        # Flush in Loop Detection (Performance Anti-Pattern)
        flush_in_loop:
            enabled: true
            flush_count_threshold: 5  # Minimum number of flush calls to trigger detection
            time_window_ms: 1000      # Time window to consider flushes as being in a loop

        # Lazy Loading Detection (N+1 variant)
        lazy_loading:
            enabled: true
            threshold: 10  # Minimum number of lazy load queries to trigger detection

        # DQL Injection Security Scanner
        dql_injection:
            enabled: true
            # No threshold - security issues are always flagged

        # Bulk Operation Detection
        bulk_operation:
            enabled: true
            threshold: 20  # Minimum number of UPDATE/DELETE to suggest bulk operations

        # findAll() Usage Detection
        find_all:
            enabled: true
            threshold: 99  # Maximum number of rows before flagging as issue

        # Database / ORM Configuration Checks
        strict_mode:
            enabled: true

        charset:
            enabled: true

        inno_db_engine:
            enabled: true

        connection_pooling:
            enabled: true

        doctrine_cache:
            enabled: true

        # Entity / Mapping Best Practices
        collection_initialization:
            enabled: true

        cascade_configuration:
            enabled: true

        foreign_key_mapping:
            enabled: true

        partial_object:
            enabled: true
            threshold: 5  # Minimum number of queries to trigger detection

        dto_hydration:
            enabled: true

        cascade_all:
            enabled: true

        cascade_persist_on_independent_entity:
            enabled: true
            # independent_entity_patterns: ['User', 'Customer', 'Account', ...]  # Customize entity patterns considered independent

        missing_orphan_removal_on_composition:
            enabled: true

        cascade_remove_on_independent_entity:
            enabled: true

        bidirectional_consistency:
            enabled: true

        orphan_removal_without_cascade_remove:
            enabled: true

        on_delete_cascade_mismatch:
            enabled: true

        cartesian_product:
            enabled: true
            n1_collection_threshold: 3  # Minimum N+1 queries per collection to consider a risk group

        naming_convention:
            enabled: true

        missing_embeddable_opportunity:
            enabled: true

        blameable_trait:
            enabled: true

        # Security / Data Protection
        insecure_random:
            enabled: true

        sensitive_data_exposure:
            enabled: true
            # sensitive_patterns: ['password', 'token', 'secret', ...]  # Customize field patterns considered sensitive

        sql_injection_in_raw_queries:
            enabled: true

        # Query Caching Opportunity Detection
        query_caching_opportunity:
            enabled: true
            frequency_threshold: 3  # Minimum query executions to suggest caching
            second_level_cache_threshold: 5  # Minimum repeated fast SELECTs (with varying params) to suggest Doctrine 2LC
            second_level_cache_max_avg_ms: 2.0  # Max average query time (ms) for 2LC opportunity
            # static_tables: ['countries', 'currencies', 'languages', ...]  # Tables considered static/rarely-changing

        # Float for Money Detection
        float_for_money:
            enabled: true
            # money_field_patterns: ['price', 'amount', 'cost', ...]  # Field patterns considered monetary
            # money_entity_patterns: ['invoice', 'order', 'payment', ...]  # Entity patterns suggesting financial context

        # Transaction Boundary Analysis
        transaction_boundary:
            enabled: true
            max_flush_per_transaction: 1  # Maximum flush() calls per transaction
            max_transaction_duration: 1.0  # Maximum transaction duration in seconds

        # JOIN Optimization Detection
        join_optimization:
            enabled: true
            max_joins_recommended: 5  # Maximum recommended number of JOINs in a single query
            max_joins_critical: 8     # Number of JOINs to mark as critical

        # Additional Analyzers (all enabled by default)
        auto_generate_proxy_classes:
            enabled: true

        collection_empty_access:
            enabled: true

        decimal_precision:
            enabled: true

        entity_state_consistency:
            enabled: true

        final_entity:
            enabled: true

        property_type_mismatch:
            enabled: true

        query_builder_best_practices:
            enabled: true

        set_max_results_with_collection_join:
            enabled: true

        type_hint_mismatch:
            enabled: true

        cascade:
            enabled: true

        collation:
            enabled: true

        column_type:
            enabled: true

        division_by_zero:
            enabled: true

        embeddable_mutability:
            enabled: true

        embeddable_without_value_object:
            enabled: true

        entity_manager_in_entity:
            enabled: true

        float_in_money_embeddable:
            enabled: true

        flush_in_loop_analyzer_modern:
            enabled: true

        ineffective_like:
            enabled: true

        join_type_consistency:
            enabled: true

        null_comparison:
            enabled: true

        order_by_without_limit:
            enabled: true

        primary_key_strategy:
            enabled: true

        soft_deleteable_trait:
            enabled: true

        time_zone:
            enabled: true

        timestampable_trait:
            enabled: true

        year_function_optimization:
            enabled: true
